<header class="site-header">
    <div class="container site-header-inner">
      <div class="brand">
        <a href="/" aria-label="FIMBY home">
          <img src="https://fimby.com/wp-content/uploads/2026/03/FIMBYwGrass.png" alt="FIMBY" class="brand-logo" />
        </a>
      </div>
      <nav class="nav" aria-label="Main">
        <a href="/" class="nav-link">Home</a>
        <a href="/how-it-works/" class="nav-link">How it works</a>
        <a href="/our-approach/" class="nav-link">Our approach</a>
        <a href="/vision/" class="nav-link">Our vision</a>
        <a href="/faq/" class="nav-link">FAQ</a>
        <a href="/contact-us/" class="nav-link">Bring FIMBY</a>
        <a href="https://our.fimby.com/sign-up" class="btn btn-primary btn-pill">Check your neighbourhood</a>
      </nav>
      <button class="hamburger" aria-label="Menu" aria-expanded="false">
        <span></span><span></span><span></span>
      </button>
    </div>
    <nav class="mobile-nav" aria-label="Mobile">
      <a href="/">Home</a>
      <a href="/how-it-works/">How it works</a>
      <a href="/our-approach/">Our approach</a>
      <a href="/vision/">Our vision</a>
      <a href="/faq/">FAQ</a>
      <a href="/contact-us/">Bring FIMBY here</a>
      <a href="https://our.fimby.com/sign-up" class="mobile-join">Check your neighbourhood</a>
    </nav>
  </header>

  <script>
  var hamburger = document.querySelector('.hamburger');
  var mobileNav = document.querySelector('.mobile-nav');
  if (hamburger && mobileNav) {
    hamburger.addEventListener('click', function() {
      hamburger.classList.toggle('active');
      mobileNav.classList.toggle('open');
      hamburger.setAttribute('aria-expanded', mobileNav.classList.contains('open'));
    });
    mobileNav.querySelectorAll('a').forEach(function(link) {
      link.addEventListener('click', function() {
        hamburger.classList.remove('active');
        mobileNav.classList.remove('open');
        hamburger.setAttribute('aria-expanded', 'false');
      });
    });
  }
  </script>
