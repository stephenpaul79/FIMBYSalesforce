<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Screen 4 explainer box — drop-in</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --fimby-surface-page: #F0EBE3;
      --fimby-surface-card: #FAF7F2;
      --fimby-earth-teal: #448E9E;
      --fimby-shadow-card: 0 2px 8px rgba(38, 26, 17, 0.08), 0 1px 2px rgba(38, 26, 17, 0.04);
    }

    * { box-sizing: border-box; margin: 0; }

    html, body {
      background: var(--fimby-surface-page);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    .stage {
      display: inline-block;
      padding: 48px;
      background: var(--fimby-surface-page);
    }

    .explainer {
      display: inline-block;
      width: max-content;
      max-width: none;
      background: var(--fimby-earth-teal);
      border-radius: 18px;
      box-shadow: var(--fimby-shadow-card);
      padding: 40px 48px;
      color: var(--fimby-surface-card);
    }

    .explainer h3 {
      margin: 0 0 18px;
      font-size: 46px;
      font-weight: 700;
      line-height: 1.08;
      letter-spacing: -0.03em;
      white-space: nowrap;
    }

    .explainer p {
      margin: 0;
      font-size: 34px;
      font-weight: 400;
      line-height: 1.45;
      opacity: 0.94;
      white-space: nowrap;
    }

    .explainer p + p {
      margin-top: 14px;
    }

    .explainer strong {
      font-weight: 700;
    }
  </style>
</head>
<body>
  <div class="stage">
    <div class="explainer">
      <h3>Porch tea, block party, or community night.</h3>
      <p><strong>Gathering</strong> — RSVP with a headcount; spots are capped so everyone fits.</p>
      <p><strong>Open event</strong> — one tap to say you're going; see who's coming.</p>
      <p><strong>Community event</strong> — share an outside event your neighbours should know about.</p>
    </div>
  </div>
</body>
</html>
