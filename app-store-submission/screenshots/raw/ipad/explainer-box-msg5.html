<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Screen 5 explainer box — drop-in</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap" rel="stylesheet" />
  <style>
    /* Tokens from FIMBY Website/custom-css.css */
    :root {
      --fimby-surface-page: #F0EBE3;
      --fimby-surface-card: #FAF7F2;
      --fimby-btn-primary-bg: #3A7D8C;
      --fimby-shadow-card: 0 2px 8px rgba(38, 26, 17, 0.08), 0 1px 2px rgba(38, 26, 17, 0.04);
    }

    * { box-sizing: border-box; margin: 0; }

    html, body {
      background: var(--fimby-surface-page);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, "Segoe UI", sans-serif;
    }

    /* Beige padding around the box so the rounded corners crop cleanly. */
    .stage {
      display: inline-block;
      padding: 48px;
      background: var(--fimby-surface-page);
    }

    /* homepage .message-strip.dark — shrinks to fit the text */
    .explainer {
      display: inline-block;
      background: var(--fimby-btn-primary-bg);
      border-radius: 18px;
      box-shadow: var(--fimby-shadow-card);
      padding: 40px 48px;
      color: var(--fimby-surface-card);
    }

    .explainer h3 {
      margin: 0 0 10px;
      font-size: 48px;
      font-weight: 700;
      line-height: 1.06;
      letter-spacing: -0.03em;
    }

    .explainer p {
      margin: 0;
      font-size: 36px;
      font-weight: 400;
      line-height: 1.4;
      opacity: 0.92;
    }
  </style>
</head>
<body>
  <div class="stage">
    <div class="explainer">
      <h3>Direct messages, ask &amp; offer replies,</h3>
      <p>events, lending — one inbox.</p>
    </div>
  </div>
</body>
</html>
