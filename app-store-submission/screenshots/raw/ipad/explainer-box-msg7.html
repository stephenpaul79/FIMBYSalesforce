<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Screen 7 explainer box — quiet hours / notifications (drop-in)</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --panda-bg: #14100D;
      --callout-fill: #3D342C;
      --callout-text: #F0EBE3;
      --callout-text-muted: #D6CFC7;
      --shadow-callout: 0 12px 40px rgba(0, 0, 0, 0.45), 0 2px 8px rgba(0, 0, 0, 0.25);
    }

    * { box-sizing: border-box; margin: 0; }

    html, body {
      background: var(--panda-bg);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    /* Dark stage so the box previews on the quiet-hours panda screen */
    .stage {
      display: inline-block;
      padding: 48px;
      background: var(--panda-bg);
    }

    .explainer {
      display: inline-block;
      width: max-content;
      min-width: 1000px;
      max-width: 1000px;
      background: var(--callout-fill);
      border-radius: 18px;
      box-shadow: var(--shadow-callout);
      padding: 40px 48px;
      color: var(--callout-text);
    }

    .explainer h3 {
      margin: 0 0 18px;
      font-size: 44px;
      font-weight: 700;
      line-height: 1.08;
      letter-spacing: -0.03em;
    }

    .explainer p {
      margin: 0;
      font-size: 30px;
      font-weight: 400;
      line-height: 1.45;
      color: var(--callout-text-muted);
    }

    .explainer p + p {
      margin-top: 14px;
    }

    .explainer strong {
      font-weight: 600;
      color: var(--callout-text);
    }
  </style>
</head>
<body>
  <div class="stage">
    <div class="explainer">
      <h3>Your attention is not for sale.</h3>
      <p><strong>No ads.</strong> No engagement tricks. Quiet hours and batched alerts: a signal when something matters, not a feed of&nbsp;buzzes.</p>
    </div>
  </div>
</body>
</html>
