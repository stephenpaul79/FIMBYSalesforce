<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <meta name="robots" content="noindex,nofollow" />
  <title>Opening FIMBY…</title>
  <style>
    :root {
      color-scheme: light dark;
      --bg: #ffffff;
      --fg: #1a1a1a;
      --muted: #5a5a5a;
      --accent: #67bbd2;
    }
    @media (prefers-color-scheme: dark) {
      :root { --bg: #0b0f12; --fg: #f5f5f5; --muted: #a8b1b8; }
    }
    html, body { margin: 0; padding: 0; height: 100%; }
    body {
      background: var(--bg);
      color: var(--fg);
      font: 400 16px/1.45 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, system-ui, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .card {
      max-width: 420px;
      text-align: center;
    }
    h1 {
      font-size: 1.25rem;
      margin: 0 0 0.5rem 0;
    }
    p { color: var(--muted); margin: 0.25rem 0; }
    .stores {
      display: flex;
      gap: 12px;
      justify-content: center;
      margin-top: 1.25rem;
      flex-wrap: wrap;
    }
    a.store {
      display: inline-block;
      padding: 10px 14px;
      border-radius: 8px;
      background: var(--accent);
      color: #ffffff;
      text-decoration: none;
      font-weight: 600;
    }
  </style>
</head>
<body>
  <main class="card">
    <h1>Opening FIMBY…</h1>
    <p>If FIMBY does not open automatically, install it from your app store.</p>
    <div class="stores" id="stores" hidden>
      <a class="store" href="https://apps.apple.com/app/id0000000000">App Store</a>
      <a class="store" href="https://play.google.com/store/apps/details?id=com.fimby.app">Google Play</a>
    </div>
  </main>
  <script>
    // If the OS hasn't handed off to the installed FIMBY app within a short
    // window, assume it isn't installed and surface the store links. We don't
    // touch any query string values — the app/OS already consumed the code
    // and state from the URL when it handled the deep link.
    setTimeout(function () {
      var el = document.getElementById('stores');
      if (el) el.hidden = false;
    }, 1500);
  </script>
</body>
</html>
