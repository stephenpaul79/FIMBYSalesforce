<template>
    <template lwc:if={_isVisible}>
        <div class="modal-backdrop" onclick={handleBackdropClick} onkeydown={handleKeyDown}
             role="dialog" aria-modal="true" aria-labelledby="confirmation-modal-title">
            <div class="modal-container" onclick={handleModalClick}>

                <!-- Header -->
                <div class="modal-header">
                    <h2 id="confirmation-modal-title" class="modal-title">Your Turn!</h2>
                    <button class="close-button" onclick={handleClose} aria-label="Close">
                        <lightning-icon icon-name="utility:close" size="small"></lightning-icon>
                    </button>
                </div>

                <div class="modal-body">

                    <!-- Loading -->
                    <template lwc:if={isLoading}>
                        <div class="state-container">
                            <c-fimby-loading-message context="lending" size="medium"></c-fimby-loading-message>
                        </div>
                    </template>

                    <!-- Already Handled -->
                    <template lwc:elseif={isAlreadyHandled}>
                        <div class="state-container info-state">
                            <lightning-icon icon-name="utility:check" size="medium" variant="success"></lightning-icon>
                            <p class="state-message">Looks like you already took action here.</p>
                            <button class="submit-btn" onclick={handleClose}>Got It</button>
                        </div>
                    </template>

                    <!-- Error -->
                    <template lwc:elseif={isError}>
                        <div class="state-container">
                            <c-fimby-inline-banner variant="error" message={_errorMessage}></c-fimby-inline-banner>
                            <button class="secondary-btn" onclick={handleRetry}>Try Again</button>
                        </div>
                    </template>

                    <!-- Submitting -->
                    <template lwc:elseif={isSubmitting}>
                        <div class="state-container">
                            <c-fimby-loading-message context="lending" size="medium"></c-fimby-loading-message>
                        </div>
                    </template>

                    <!-- Success -->
                    <template lwc:elseif={isSuccess}>
                        <template lwc:if={_wasConfirmed}>
                            <div class="state-container success-state">
                                <c-fimby-celebration action-type="confirm-lend"></c-fimby-celebration>
                                <h2 class="success-title">{_successTitle}</h2>
                                <p class="success-subtitle">{_successSubtitle}</p>
                                <button class="submit-btn" onclick={handleSuccessDone}>Done</button>
                            </div>
                        </template>
                        <template lwc:else>
                            <div class="state-container neutral-result">
                                <h2 class="neutral-title">{_successTitle}</h2>
                                <p class="success-subtitle">{_successSubtitle}</p>
                                <button class="secondary-btn" onclick={handleSuccessDone}>Done</button>
                            </div>
                        </template>
                    </template>

                    <!-- Form -->
                    <template lwc:elseif={isForm}>
                        <template lwc:if={showIdentityBanner}>
                            <div class="posting-as">
                                <img src={posterIconUrl} alt="" class="posting-as-icon">
                                <span class="posting-as-label">Confirming as:</span>
                                <span class="posting-as-value">{postingAsDisplayName}</span>
                            </div>
                        </template>
                        <div class="request-info">
                            {requestInfo}
                        </div>

                        <p class="question-text">Do you still want to borrow this?</p>

                        <div class="decision-toggle">
                            <button class={yesRadioClass} onclick={handleSelectYes}>
                                <span class="radio-dot"></span>
                                <span>Yes</span>
                            </button>
                            <button class={noRadioClass} onclick={handleSelectNo}>
                                <span class="radio-dot"></span>
                                <span>No</span>
                            </button>
                        </div>

                        <template lwc:if={isYesDecision}>
                            <div class="field-group">
                                <label class="field-label" for="cm-borrow-date">When would you like to borrow it?</label>
                                <input id="cm-borrow-date" type="date" class="form-input"
                                       value={borrowDate} onchange={handleBorrowDateChange}
                                       min={todayDate} required>
                            </div>
                        </template>
                    </template>

                </div>

                <!-- Footer: Form -->
                <template lwc:if={isForm}>
                    <div class="modal-footer">
                        <button class="cancel-btn" onclick={handleClose}>Cancel</button>
                        <button class="submit-btn" onclick={handleSubmit}
                                disabled={isSubmitDisabled}>
                            <span>{submitButtonLabel}</span>
                        </button>
                    </div>
                </template>

            </div>
        </div>
    </template>
</template>
