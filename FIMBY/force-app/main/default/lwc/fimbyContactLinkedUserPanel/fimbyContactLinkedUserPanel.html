<template>
    <div class="linked-user-panel">
        <template lwc:if={isLoading}>
            <div class="slds-is-relative slds-p-around_medium">
                <lightning-spinner alternative-text="Loading linked user" size="small"></lightning-spinner>
            </div>
        </template>

        <template lwc:elseif={loadError}>
            <div class="slds-notify slds-notify_alert slds-alert_error slds-m-around_small" role="alert">
                <span>We could not load the linked user for this contact.</span>
            </div>
        </template>

        <template lwc:elseif={hasLinkedUser}>
            <div class="user-summary slds-p-horizontal_small slds-p-top_small">
                <p class="slds-text-body_regular">
                    <span class="slds-text-color_weak">Linked user:</span>
                    <a href={userRecordUrl} class="slds-m-left_xx-small">{linkedUser.name}</a>
                    <span class="slds-m-left_x-small slds-text-color_weak">({linkedUser.username})</span>
                    <span class={userStatusClass}>{userStatusLabel}</span>
                </p>
            </div>

            <!-- Account & Summary: User.FIMBY_Summary_Emails__c is source of truth (Contact.Summary_Email_Frequency__c is legacy flows only) -->
            <section class={accountSectionClass}>
                <h3 class="slds-section__title">
                    <button
                        type="button"
                        class="slds-button slds-section__title-action"
                        data-section="account"
                        onclick={handleToggleSection}>
                        <lightning-icon icon-name="utility:switch" size="x-small" class="slds-section__title-action-icon slds-m-right_x-small"></lightning-icon>
                        <span class="slds-truncate" title="Account &amp; Summary">Account &amp; Summary</span>
                    </button>
                </h3>
                <div class="slds-section__content">
                    <lightning-record-view-form record-id={userId} object-api-name="User">
                        <div class="slds-grid slds-wrap slds-gutters_direct">
                            <div class="slds-col slds-size_1-of-1 slds-medium-size_1-of-2">
                                <lightning-output-field field-name="FIMBY_Summary_Emails__c"></lightning-output-field>
                            </div>
                            <div class="slds-col slds-size_1-of-1 slds-medium-size_1-of-2">
                                <lightning-output-field field-name="LastLoginDate"></lightning-output-field>
                            </div>
                        </div>
                    </lightning-record-view-form>
                </div>
            </section>

            <!-- Onboarding Walkthrough -->
            <section class={walkthroughSectionClass}>
                <h3 class="slds-section__title">
                    <button
                        type="button"
                        class="slds-button slds-section__title-action"
                        data-section="walkthrough"
                        onclick={handleToggleSection}>
                        <lightning-icon icon-name="utility:switch" size="x-small" class="slds-section__title-action-icon slds-m-right_x-small"></lightning-icon>
                        <span class="slds-truncate" title="Onboarding Walkthrough">Onboarding Walkthrough</span>
                    </button>
                </h3>
                <div class="slds-section__content">
                    <lightning-record-view-form record-id={userId} object-api-name="User">
                        <div class="slds-grid slds-wrap slds-gutters_direct">
                            <div class="slds-col slds-size_1-of-1 slds-medium-size_1-of-2">
                                <lightning-output-field field-name="Onboarding_Walkthrough_Status__c"></lightning-output-field>
                            </div>
                            <div class="slds-col slds-size_1-of-1 slds-medium-size_1-of-2">
                                <lightning-output-field field-name="Onboarding_Walkthrough_Dismissed_At__c"></lightning-output-field>
                            </div>
                        </div>
                    </lightning-record-view-form>
                </div>
            </section>

            <!-- Email Alerts -->
            <section class={emailSectionClass}>
                <h3 class="slds-section__title">
                    <button
                        type="button"
                        class="slds-button slds-section__title-action"
                        data-section="email"
                        onclick={handleToggleSection}>
                        <lightning-icon icon-name="utility:switch" size="x-small" class="slds-section__title-action-icon slds-m-right_x-small"></lightning-icon>
                        <span class="slds-truncate" title="Email Alerts">Email Alerts</span>
                    </button>
                </h3>
                <div class="slds-section__content">
                    <lightning-record-view-form record-id={userId} object-api-name="User">
                        <div class="slds-grid slds-wrap slds-gutters_direct">
                            <div class="slds-col slds-size_1-of-1 slds-medium-size_1-of-2">
                                <lightning-output-field field-name="Email_Alerts_Enabled__c"></lightning-output-field>
                                <lightning-output-field field-name="Email_Alert_Messages__c"></lightning-output-field>
                                <lightning-output-field field-name="Email_Alert_Needs_Offers__c"></lightning-output-field>
                                <lightning-output-field field-name="Email_Alert_Library__c"></lightning-output-field>
                            </div>
                            <div class="slds-col slds-size_1-of-1 slds-medium-size_1-of-2">
                                <lightning-output-field field-name="Email_Alert_Stories__c"></lightning-output-field>
                                <lightning-output-field field-name="Email_Alert_Reminders__c"></lightning-output-field>
                                <lightning-output-field field-name="Email_Alert_Bulk_Buy__c"></lightning-output-field>
                                <lightning-output-field field-name="Email_Alert_Events__c"></lightning-output-field>
                            </div>
                        </div>
                    </lightning-record-view-form>
                </div>
            </section>

            <!-- Push & Scheduling -->
            <section class={pushSectionClass}>
                <h3 class="slds-section__title">
                    <button
                        type="button"
                        class="slds-button slds-section__title-action"
                        data-section="push"
                        onclick={handleToggleSection}>
                        <lightning-icon icon-name="utility:switch" size="x-small" class="slds-section__title-action-icon slds-m-right_x-small"></lightning-icon>
                        <span class="slds-truncate" title="Push &amp; Scheduling">Push &amp; Scheduling</span>
                    </button>
                </h3>
                <div class="slds-section__content">
                    <lightning-record-view-form record-id={userId} object-api-name="User">
                        <div class="slds-grid slds-wrap slds-gutters_direct">
                            <div class="slds-col slds-size_1-of-1 slds-medium-size_1-of-2">
                                <lightning-output-field field-name="Push_Notifications_Enabled__c"></lightning-output-field>
                                <lightning-output-field field-name="Push_Messages__c"></lightning-output-field>
                                <lightning-output-field field-name="Push_Needs_Offers__c"></lightning-output-field>
                                <lightning-output-field field-name="Push_Library__c"></lightning-output-field>
                                <lightning-output-field field-name="Push_Stories__c"></lightning-output-field>
                                <lightning-output-field field-name="Push_Bulk_Buy__c"></lightning-output-field>
                            </div>
                            <div class="slds-col slds-size_1-of-1 slds-medium-size_1-of-2">
                                <lightning-output-field field-name="Push_Reminders__c"></lightning-output-field>
                                <lightning-output-field field-name="Push_Events__c"></lightning-output-field>
                                <lightning-output-field field-name="Quiet_Hours_Preference__c"></lightning-output-field>
                                <lightning-output-field field-name="Include_Sundays__c"></lightning-output-field>
                                <lightning-output-field field-name="Theme_Preference__c"></lightning-output-field>
                            </div>
                        </div>
                    </lightning-record-view-form>
                </div>
            </section>

            <!-- App Activity (read-only) -->
            <section class={activitySectionClass}>
                <h3 class="slds-section__title">
                    <button
                        type="button"
                        class="slds-button slds-section__title-action"
                        data-section="activity"
                        onclick={handleToggleSection}>
                        <lightning-icon icon-name="utility:switch" size="x-small" class="slds-section__title-action-icon slds-m-right_x-small"></lightning-icon>
                        <span class="slds-truncate" title="App Activity">App Activity</span>
                    </button>
                </h3>
                <div class="slds-section__content">
                    <lightning-record-view-form record-id={userId} object-api-name="User">
                        <div class="slds-grid slds-wrap slds-gutters_direct">
                            <div class="slds-col slds-size_1-of-1 slds-medium-size_1-of-2">
                                <lightning-output-field field-name="Last_App_Visit__c"></lightning-output-field>
                                <lightning-output-field field-name="Last_DM_Push_At__c"></lightning-output-field>
                            </div>
                            <div class="slds-col slds-size_1-of-1 slds-medium-size_1-of-2">
                                <lightning-output-field field-name="Last_Activity_Push_At__c"></lightning-output-field>
                                <lightning-output-field field-name="Last_Quiet_Refresh_At__c"></lightning-output-field>
                            </div>
                        </div>
                    </lightning-record-view-form>
                </div>
            </section>
        </template>

        <template lwc:else>
            <div class="empty-state slds-p-around_large slds-text-align_center">
                <lightning-icon icon-name="utility:user" size="small" class="slds-m-bottom_x-small"></lightning-icon>
                <p class="slds-text-heading_small">No linked User found</p>
                <p class="slds-text-body_regular slds-text-color_weak slds-m-top_x-small">
                    This contact does not have a community User record yet.
                </p>
            </div>
        </template>
    </div>
</template>
