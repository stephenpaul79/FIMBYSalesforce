<template>
    <template lwc:if={isOpen}>
        <div class="modal-backdrop"
             role="dialog"
             aria-modal="true"
             aria-labelledby="vouch-decline-title"
             onclick={handleBackdrop}
             onkeydown={handleKeydown}>
            <div class="modal-container">
                <div class="modal-header">
                    <h2 id="vouch-decline-title" class="modal-title">Why are you declining?</h2>
                    <button type="button"
                            class="close-btn"
                            aria-label="Close"
                            onclick={handleCancel}>
                        <lightning-icon icon-name="utility:close" size="x-small"></lightning-icon>
                    </button>
                </div>

                <div class="modal-body">
                    <template lwc:if={isBlockedByActingAs}>
                        <div class="acting-as-block" role="alert">
                            <lightning-icon icon-name="utility:info" size="small" alternative-text="Identity required"></lightning-icon>
                            <p>{actingAsBlockMessage}</p>
                        </div>
                    </template>
                    <p class="modal-subtext">
                        This stays private. The person asking will only see that you declined.
                    </p>

                    <fieldset class="reason-group">
                        <legend class="visually-hidden">Decline reason</legend>
                        <template for:each={reasonOptions} for:item="opt">
                            <label key={opt.value} class="reason-item">
                                <input type="radio"
                                       name="declineReason"
                                       id={opt.inputId}
                                       value={opt.value}
                                       checked={opt.checked}
                                       onchange={handleReasonChange}>
                                <span class="reason-label">{opt.label}</span>
                            </label>
                        </template>
                    </fieldset>

                    <template lwc:if={showDetailsField}>
                        <div class="details-field">
                            <div class="field-label-row">
                                <label for="declineDetails" class="field-label">A few words</label>
                                <span class={detailsCountClass}>{detailsCharCount}/500</span>
                            </div>
                            <textarea id="declineDetails"
                                      class="details-input"
                                      maxlength="500"
                                      rows="3"
                                      value={details}
                                      oninput={handleDetailsInput}></textarea>
                        </div>
                    </template>
                </div>

                <div class="modal-footer">
                    <button type="button"
                            class="nav-btn nav-back"
                            onclick={handleCancel}
                            disabled={isSubmitting}>
                        <lightning-icon icon-name="utility:chevronleft" size="xx-small"></lightning-icon>
                        <span>Cancel</span>
                    </button>
                    <button type="button"
                            class="nav-btn nav-next"
                            onclick={handleSubmit}
                            disabled={isSubmitDisabled}>
                        <template lwc:if={isSubmitting}>
                            <span>Sending...</span>
                        </template>
                        <template lwc:else>
                            <span>Send decline</span>
                        </template>
                    </button>
                </div>
            </div>
        </div>
    </template>
</template>
