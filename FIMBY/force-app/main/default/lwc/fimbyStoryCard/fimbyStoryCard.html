<template>
    <div class="fimby-story-card">
        <!-- Story Header -->
        <div class="story-header">
            <div class="story-author">
                <img src={storyAuthorAvatar} alt={storyAuthor} class="author-avatar">
                <div class="author-info">
                    <div class="author-name">{storyAuthor}</div>
                    <div class="story-meta">
                        <span class="story-type">{formattedStoryType}</span>
                        <span class="story-time">{formattedTime}</span>
                    </div>
                </div>
            </div>
            <div class="story-actions">
                <button class="story-menu-btn" onclick={handleMenuClick}>
                    <lightning-icon icon-name="utility:threedots" size="small"></lightning-icon>
                </button>
            </div>
        </div>

        <!-- Story Title -->
        <div lwc:if={storyTitle} class="story-title-section">
            <h2 class="story-title">{storyTitle}</h2>
        </div>

        <!-- Story Content -->
        <div class="story-content">
            <div class="story-text">
                <lightning-formatted-rich-text
                    value={storyMessage}
                    class="story-message">
                </lightning-formatted-rich-text>
            </div>

            <!-- Story Image -->
            <div lwc:if={storyImageUrl} class="story-image-container">
                <img src={processedStoryImageUrl} alt="Post image" class="story-image" onclick={handleImageClick}>
                <div lwc:if={showImageOverlay} class="image-overlay" onclick={handleImageClick}>
                    <lightning-icon icon-name="utility:zoomin" size="medium" variant="inverse"></lightning-icon>
                </div>
            </div>
        </div>

        <!-- Story Tags -->
        <div lwc:if={showTags} class="story-tags">
            <template for:each={storyTags} for:item="tag">
                <span key={tag} class="story-tag" onclick={handleTagClick} data-tag={tag}>
                    #{tag}
                </span>
            </template>
        </div>

        <!-- Story Interactions -->
        <div class="story-interactions">
            <!-- Like Button -->
            <button class="interaction-btn like-btn" onclick={handleLikeClick}>
                <lightning-icon
                    icon-name={likeIcon}
                    size="small"
                    variant={likeVariant}>
                </lightning-icon>
                <span class="interaction-label">
                    {likeCount}
                    <span lwc:if={showLikeLabel}> {likeLabel}</span>
                </span>
            </button>

            <!-- Comment Button -->
            <button class="interaction-btn comment-btn" onclick={handleCommentClick}>
                <lightning-icon icon-name="utility:comments" size="small" variant="neutral"></lightning-icon>
                <span class="interaction-label">Comments</span>
            </button>

            <!-- Share Button -->
            <button class="interaction-btn share-btn" onclick={handleShareClick}>
                <lightning-icon icon-name="utility:share_post" size="small" variant="neutral"></lightning-icon>
                <span class="interaction-label">Share</span>
            </button>

            <!-- Prayer Button (for prayer stories) -->
            <button lwc:if={isPrayerStory} class="interaction-btn prayer-btn" onclick={handlePrayerClick}>
                <lightning-icon icon-name="utility:heart" size="small" variant="brand"></lightning-icon>
                <span class="interaction-label">
                    {prayerCount}
                    <span lwc:if={showPrayerLabel}> {prayerLabel}</span>
                </span>
            </button>

            <!-- Thank Button (for thank you stories) -->
            <button lwc:if={isThankYouStory} class="interaction-btn thank-btn" onclick={handleThankClick}>
                <lightning-icon icon-name="utility:favorite" size="small" variant="error"></lightning-icon>
                <span class="interaction-label">Thanks</span>
            </button>
        </div>

        <!-- Recent Likes -->
        <div lwc:if={showRecentLikes} class="recent-likes">
            <div class="likes-avatars">
                <template for:each={recentLikes} for:item="like">
                    <img key={like.id}
                         src={like.avatar}
                         alt={like.name}
                         class="like-avatar"
                         title={like.name}>
                </template>
            </div>
            <div class="likes-text">
                <template lwc:if={hasMultipleLikes}>
                    Liked by <strong>{firstLiker}</strong> and <strong>{otherLikesCount} others</strong>
                </template>
                <template lwc:else>
                    Liked by <strong>{firstLiker}</strong>
                </template>
            </div>
        </div>

        <!-- Comments Preview -->
        <div lwc:if={showCommentsPreview} class="comments-preview">
            <template for:each={previewComments} for:item="comment">
                <div key={comment.id} class="comment-preview">
                    <img src={comment.authorAvatar} alt={comment.authorName} class="comment-avatar">
                    <div class="comment-content">
                        <span class="comment-author">{comment.authorName}</span>
                        <span class="comment-text">{comment.text}</span>
                    </div>
                </div>
            </template>

            <template lwc:if={hasMoreComments}>
                <button class="view-all-comments" onclick={handleViewAllComments}>
                    View comments
                </button>
            </template>
        </div>

        <!-- Quick Comment -->
        <div lwc:if={showQuickComment} class="quick-comment">
            <img src={currentUserAvatar} alt="Your avatar" class="comment-input-avatar">
            <div class="comment-input-container">
                <lightning-input
                    type="text"
                    placeholder="Add a comment..."
                    value={quickCommentText}
                    onchange={handleQuickCommentChange}
                    onkeydown={handleQuickCommentKeydown}
                    class="comment-input">
                </lightning-input>
                <button lwc:if={quickCommentText}
                        class="send-comment-btn"
                        onclick={handleSendQuickComment}>
                    <lightning-icon icon-name="utility:send" size="x-small" variant="brand"></lightning-icon>
                </button>
            </div>
        </div>
    </div>

    <!-- Comment Composer Modal -->
    <template lwc:if={showCommentModal}>
        <c-fimby-comment-composer
            record-id={recordId}
            onclose={handleCommentModalClose}
            oncommentposted={handleCommentPosted}>
        </c-fimby-comment-composer>
    </template>

    <!-- Report Content Modal -->
    <c-fimby-report-content
        content-id={storyId}
        content-type="Story"
        onreportsubmitted={handleReportSubmitted}>
    </c-fimby-report-content>
</template>
