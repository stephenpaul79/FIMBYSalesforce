<template>
    <template lwc:if={_isVisible}>
        <div class="modal-backdrop" onclick={handleBackdropClick} onkeydown={handleKeyDown}
             role="dialog" aria-modal="true" aria-labelledby="pickup-modal-title">
            <div class="modal-container" onclick={handleModalClick}>

                <!-- Header -->
                <div class="modal-header">
                    <h2 id="pickup-modal-title" class="modal-title">Confirm Pickup</h2>
                    <button class="close-button" onclick={handleClose} aria-label="Close">
                        <lightning-icon icon-name="utility:close" size="small"></lightning-icon>
                    </button>
                </div>

                <div class="modal-body">

                    <!-- Loading -->
                    <template lwc:if={isLoading}>
                        <div class="state-container">
                            <c-fimby-loading-message context="lending" size="medium"></c-fimby-loading-message>
                        </div>
                    </template>

                    <!-- Already Handled -->
                    <template lwc:elseif={isAlreadyHandled}>
                        <div class="state-container info-state">
                            <lightning-icon icon-name="utility:check" size="medium" variant="success"></lightning-icon>
                            <p class="state-message">Looks like you already took action here.</p>
                            <button class="submit-btn" onclick={handleClose}>Got It</button>
                        </div>
                    </template>

                    <!-- Error -->
                    <template lwc:elseif={isError}>
                        <div class="state-container error-state">
                            <c-fimby-inline-banner variant="error" message={_errorMessage}></c-fimby-inline-banner>
                            <button class="secondary-btn" onclick={handleRetry}>Try Again</button>
                        </div>
                    </template>

                    <!-- Submitting -->
                    <template lwc:elseif={isSubmitting}>
                        <div class="state-container">
                            <c-fimby-loading-message context="lending" size="medium"></c-fimby-loading-message>
                        </div>
                    </template>

                    <!-- Success -->
                    <template lwc:elseif={isSuccess}>
                        <div class="state-container success-state">
                            <c-fimby-celebration action-type="borrow"></c-fimby-celebration>
                            <h2 class="success-title">Pickup confirmed!</h2>
                            <p class="success-subtitle">The item is now on loan.</p>
                            <button class="submit-btn" onclick={handleSuccessDone}>Done</button>
                        </div>
                    </template>

                    <!-- Form -->
                    <template lwc:elseif={isForm}>
                        <div class="pickup-summary">
                            <div class="pickup-detail">
                                <span class="pickup-label">Item</span>
                                <span class="pickup-value">{itemName}</span>
                            </div>
                            <div class="pickup-detail">
                                <span class="pickup-label">Borrower</span>
                                <span class="pickup-value">{requesterName}</span>
                            </div>
                            <div class="pickup-detail">
                                <span class="pickup-label">Lender</span>
                                <span class="pickup-value">{ownerName}</span>
                            </div>
                            <template lwc:if={dueDateFormatted}>
                                <div class="pickup-detail">
                                    <span class="pickup-label">Due back</span>
                                    <span class="pickup-value">{dueDateFormatted}</span>
                                </div>
                            </template>
                        </div>

                        <c-fimby-safety-note></c-fimby-safety-note>

                        <p class="confirm-message">Confirm that the item has been picked up?</p>
                    </template>

                </div>

                <!-- Footer: form state only -->
                <template lwc:if={isForm}>
                    <div class="modal-footer">
                        <button class="cancel-btn" onclick={handleClose}>Cancel</button>
                        <button class="submit-btn" onclick={handleConfirm}>
                            <span>Confirm Pickup</span>
                        </button>
                    </div>
                </template>

            </div>
        </div>
    </template>
</template>
