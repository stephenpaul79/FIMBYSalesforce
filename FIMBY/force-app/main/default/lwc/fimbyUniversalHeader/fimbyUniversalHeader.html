<template>
    <div class="fimby-universal-header">
        <!-- Single-row header: [Brand] [Desktop Nav] [Actions] -->
        <div class="header-row-one">
            <div class="brand-zone">
                <button type="button" class="brand-section" aria-label="FIMBY home" onclick={handleLogoClick}>
                    <img src={logoUrl} alt="FIMBY" class={logoImgClass} />
                </button>
                <template lwc:if={showActingAsChip}>
                    <button type="button" class="acting-as-chip" onclick={handleSwitchBack} aria-label={actingAsAriaLabel}>
                        <img src={actingAsAvatarUrl} alt="" class="acting-as-avatar" />
                        <span class="acting-as-name">{actingAsDisplayName}</span>
                    </button>
                </template>
            </div>

            <!-- Desktop Navigation — 5 tabs matching bottom nav, hidden on mobile -->
            <div class="desktop-nav">
                <button type="button" class={homeDesktopClass} onclick={handleNavClick} data-tab="home" data-tour="nav-home" aria-label="Home">
                    <img src={homeIconUrl} alt="Home" class="desktop-nav-icon" />
                    <div class={homeIndicator}></div>
                </button>

                <button type="button" class={libraryDesktopClass} onclick={handleNavClick} data-tab="library" data-tour="nav-library" aria-label="Library">
                    <img src={libraryIconUrl} alt="Library" class="desktop-nav-icon" />
                    <div class={libraryIndicator}></div>
                </button>

                <button type="button" class="desktop-nav-item desktop-create-item" onclick={handleNewClick} data-tour="nav-create" aria-label="Create">
                    <div class="desktop-create-button">
                        <img src={createIconUrl} alt="Create" class="desktop-create-icon" />
                    </div>
                </button>

                <button type="button" class={messagesDesktopClass} onclick={handleNavClick} data-tab="messages" data-tour="nav-messages" aria-label={messagesAriaLabel}>
                    <span class="desktop-nav-icon-wrap">
                        <img src={messagesIconUrl} alt="" class="desktop-nav-icon" />
                        <template lwc:if={hasUnreadMessages}>
                            <span class="desktop-nav-badge" aria-hidden="true">{messageBadgeLabel}</span>
                        </template>
                    </span>
                    <div class={messagesIndicator}></div>
                </button>

                <button type="button" class={mineDesktopClass} onclick={handleNavClick} data-tab="mine" data-tour="nav-mine" aria-label="My Stuff">
                    <img src={mineIconUrl} alt="My Stuff" class="desktop-nav-icon" />
                    <div class={mineIndicator}></div>
                </button>
            </div>

            <div class="action-section">
                <!-- Bell icon for notifications -->
                <button type="button" class="bell-button" data-tour="nav-notifications" aria-label={notificationAriaLabel} onclick={handleNotificationsClick}>
                    <img src={bellIconUrl} alt="" class="bell-icon-img" />
                    <template lwc:if={hasNotifications}>
                        <span class="bell-badge" aria-hidden="true">{notificationBadgeLabel}</span>
                    </template>
                </button>
                <!-- Moderator dashboard (visible only to moderators) -->
                <template lwc:if={_isModerator}>
                    <button type="button" class="moderator-button" aria-label={moderatorAriaLabel} onclick={handleModeratorClick}>
                        <img src={moderatorIconUrl} alt="" class="moderator-icon-img" />
                        <template lwc:if={hasModeratorTasks}>
                            <span class="moderator-badge">{_moderatorTaskCount}</span>
                        </template>
                    </button>
                </template>
                <button type="button" class="search-button" data-tour="nav-search" aria-label="Search" onclick={handleSearchClick}>
                    <img src={searchIconUrl} alt="" class="action-icon-img" />
                </button>
                <button type="button" class="menu-button" data-tour="nav-menu" aria-label="Menu" onclick={handleMenuClick}>
                    <img src={menuIconUrl} alt="" class="action-icon-img" />
                </button>
            </div>
        </div>

        <!-- Menu Overlay (hidden by default) -->
        <div lwc:if={showMenuOverlay} class="menu-overlay" onclick={handleOverlayClick}>
            <div class="menu-content" onclick={handleMenuContentClick}>
                <div class="menu-header-close">
                    <button class="close-button" onclick={handleMenuClose} aria-label="Close menu">
                        <span class="close-x">&times;</span>
                    </button>
                </div>
                <div class="menu-identity-section">
                    <template lwc:if={selfMenuItem}>
                        <template lwc:if={selfIsActive}>
                            <div class="identity-row" aria-current="true">
                                <img src={selfMenuItem.avatarUrl} alt="" class="identity-avatar" />
                                <div class="identity-pill">
                                    <span class="identity-name">{selfMenuItem.name}</span>
                                </div>
                            </div>
                        </template>
                        <template lwc:else>
                            <button type="button" class="identity-row menu-item" onclick={handleSwitchBack} aria-label={switchBackAriaLabel}>
                                <img src={selfMenuItem.avatarUrl} alt="" class="identity-avatar" />
                                <span class="identity-row-name">{selfMenuItem.name}</span>
                            </button>
                        </template>
                    </template>
                    <template lwc:if={identitiesLoading}>
                        <div class="identity-row identity-loading" aria-live="polite">
                            <span class="identity-loading-text">Loading identities…</span>
                        </div>
                    </template>
                    <template for:each={otherIdentityMenuItems} for:item="identity">
                        <template lwc:if={identity.isActive}>
                            <div key={identity.relationshipId} class="identity-row" aria-current="true">
                                <img src={identity.avatarUrl} alt="" class="identity-avatar" />
                                <div class="identity-pill">
                                    <span class="identity-pill-label">Logged in as:</span>
                                    <span class="identity-name">{identity.name}</span>
                                </div>
                            </div>
                        </template>
                        <template lwc:else>
                            <button key={identity.relationshipId} type="button" class="identity-row menu-item" data-id={identity.relationshipId} onclick={handleIdentitySwitch} aria-label={identity.switchAriaLabel}>
                                <img src={identity.avatarUrl} alt="" class="identity-avatar" />
                                <div class="identity-row-info">
                                    <span class="identity-row-name">{identity.name}</span>
                                    <span class="identity-row-neighbourhood">{identity.neighbourhoodName}</span>
                                </div>
                            </button>
                        </template>
                    </template>
                    <button type="button" class="menu-item" data-tour="menu-manage-identities" onclick={handleManageIdentitiesClick}>
                        <img src={peopleIconUrl} alt="" class="menu-icon" />
                        <span>Manage identities</span>
                    </button>
                </div>
                <div class="menu-divider"></div>
                <div class="menu-items">
                    <div class="menu-items-account" data-tour="menu-account">
                        <button type="button" class="menu-item" data-tour="menu-profile" aria-label="Profile" onclick={handleProfileClick}>
                            <img src={profileMenuIconUrl} alt="" class="menu-icon" />
                            <span>Profile</span>
                        </button>
                        <button type="button" class="menu-item" data-tour="menu-settings" aria-label="Settings" onclick={handleSettingsClick}>
                            <img src={settingsMenuIconUrl} alt="" class="menu-icon" />
                            <span>Settings</span>
                        </button>
                    </div>
                    <button type="button" class="menu-item" aria-label="Help and Support" onclick={handleHelpClick}>
                        <img src={helpMenuIconUrl} alt="" class="menu-icon" />
                        <span>Help &amp; Support</span>
                    </button>
                    <button type="button" class="menu-item" aria-label="Feedback" onclick={handleFeedbackClick}>
                        <img src={feedbackMenuIconUrl} alt="" class="menu-icon" />
                        <span>Feedback</span>
                    </button>
                    <div class="menu-divider"></div>
                    <button type="button" class="menu-item menu-item-logout" aria-label="Log Out" onclick={handleLogoutClick}>
                        <img src={logoutMenuIconUrl} alt="" class="menu-icon" />
                        <span>Log Out</span>
                    </button>
                </div>
            </div>
        </div>

        <!-- Search Modal Overlay — always in DOM so focus() triggers mobile keyboard -->
        <div class={searchOverlayClass} onclick={handleSearchOverlayClick}>
            <div class="search-modal" data-tour="search-modal" onclick={handleSearchModalClick}>
                <div class="search-modal-input-row">
                    <input
                        id="search-modal-input"
                        type="text"
                        class="search-modal-input"
                        placeholder="Search shared life, offers, items, people..."
                        value={searchModalTerm}
                        data-id="search-modal-input"
                        aria-label="Search shared life, offers, items, people"
                        oninput={handleSearchModalInput}
                        onkeydown={handleSearchModalKeydown}
                    />
                    <template lwc:if={searchModalTerm}>
                        <button class="search-modal-clear" onclick={handleSearchModalClear} aria-label="Clear search">
                            <span class="modal-clear-x">&times;</span>
                        </button>
                    </template>
                    <button class="search-modal-submit" onclick={handleSearchModalSubmit} aria-label="Search">
                        <img src={searchIconUrl} alt="" class="search-submit-icon" />
                    </button>
                </div>
            </div>
        </div>

        <!-- Quick Post Modal -->
        <c-fimby-quick-post-form
            is-modal="true"
            onclose={handleQuickPostClose}>
        </c-fimby-quick-post-form>

        <!-- Live guided tour (persistent shell) -->
        <c-fimby-guided-tour></c-fimby-guided-tour>

        <!-- App Install Prompt (mobile-web only; self-gates on UA + cooldown) -->
        <c-fimby-app-prompt></c-fimby-app-prompt>

        <!-- Shell-mounted toast host for operation-failure feedback (FIMBY feedback standard) -->
        <c-fimby-toast></c-fimby-toast>

        <!-- TOS Reacceptance Modal -->
        <template lwc:if={showTosModal}>
            <div class="fimby-tos-modal-backdrop" role="dialog" aria-modal="true" aria-labelledby="tos-modal-title">
                <div class="fimby-tos-modal">
                    <h2 id="tos-modal-title" class="fimby-tos-modal-title">{tosModalTitle}</h2>
                    <p class="fimby-tos-modal-intro">{tosModalIntro}</p>
                    <c-fimby-tos-flow-screen
                        source="Login Flow"
                        oncomplete={handleTosComplete}
                        ondeclinelogout={handleLogoutClick}>
                    </c-fimby-tos-flow-screen>
                </div>
            </div>
        </template>
    </div>
</template>
