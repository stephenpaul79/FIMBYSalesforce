<template>
    <div class="fimby-search">
        <!-- Page Header -->
        <c-fimby-page-header page-title="Search"></c-fimby-page-header>

        <!-- Search Input + Filters -->
        <div class="search-container">
            <div class="search-input-wrapper">
                <lightning-input
                    type="search"
                    placeholder="Search shared life, needs, offers, items, people..."
                    value={searchTerm}
                    onchange={handleSearchChange}
                    class="search-input">
                </lightning-input>
                <button class="search-action-btn" onclick={handleSearchSubmit} aria-label="Search">
                    <img src={searchHintIconUrl} alt="" class="search-action-icon" />
                </button>
            </div>

            <!-- Filter Pills (Impact Icons) -->
            <div class="search-filters">
                <div class="filters-scroll">
                    <template for:each={searchFilters} for:item="filter">
                        <button
                            key={filter.value}
                            class={filter.cssClass}
                            onclick={handleFilterSelect}
                            data-filter={filter.value}>
                            <img src={filter.iconUrl} alt="" class="filter-icon" />
                            <span>{filter.label}{filter.countLabel}</span>
                        </button>
                    </template>
                </div>
            </div>

            <!-- Recent Searches -->
            <template lwc:if={showRecentSearches}>
                <div class="recent-searches">
                    <div class="section-header">
                        <span class="section-title">Recent Searches</span>
                        <button class="clear-all-btn" onclick={handleClearRecent}>Clear All</button>
                    </div>
                    <div class="recent-list">
                        <template for:each={recentSearches} for:item="recentItem">
                            <div role="button" tabindex="0" key={recentItem.id} class="recent-item" aria-label="Recent search" onclick={handleRecentClick} onkeydown={handleRecentKeydown} data-term={recentItem.term}>
                                <span class="recent-clock">&#128339;</span>
                                <span class="recent-term">{recentItem.term}</span>
                                <span class="recent-type">{recentItem.type}</span>
                                <button class="remove-recent" onclick={handleRemoveRecent} data-id={recentItem.id} aria-label="Remove">
                                    <span class="remove-x">&times;</span>
                                </button>
                            </div>
                        </template>
                    </div>
                </div>
            </template>
        </div>

        <!-- Search Hint -->
        <template lwc:if={showSearchHint}>
            <div class="search-hint">
                <img src={searchHintIconUrl} alt="" class="hint-icon" />
                <h3>Search your neighbourhood</h3>
                <p>Find shared life posts, needs, offers, library items, and neighbours.</p>
                <div class="hint-suggestions">
                    <span class="hint-label">Try searching for:</span>
                    <span class="hint-example">lawn mower</span>
                    <span class="hint-example">babysitting</span>
                    <span class="hint-example">moving help</span>
                    <span class="hint-example">books</span>
                </div>
            </div>
        </template>

        <!-- Loading State -->
        <template lwc:if={isSearching}>
            <div class="loading-state">
                <lightning-spinner alternative-text="Searching..." size="medium"></lightning-spinner>
                <div class="loading-text">Searching...</div>
            </div>
        </template>

        <!-- No Results State -->
        <template lwc:if={showNoResults}>
            <div class="no-results-state">
                <img src={noResultsIconUrl} alt="" class="hint-icon" />
                <h3>No results found</h3>
                <p>No matches for &ldquo;{searchTerm}&rdquo;. Try different keywords or a broader filter.</p>
            </div>
        </template>

        <!-- Search Results -->
        <template lwc:if={showResults}>
            <div class="search-results">
                <!-- Results Header -->
                <div class="results-header">
                    <span class="results-count">{resultsCount} results for &ldquo;{searchTerm}&rdquo;</span>
                    <div class="sort-container">
                        <button class="sort-btn" onclick={handleSortToggle} aria-label="Sort results">
                            <span>{currentSortLabel}</span>
                            <span class="sort-chevron">&#9662;</span>
                        </button>
                        <template lwc:if={showSortDropdown}>
                            <div class="sort-backdrop" onclick={handleSortBackdropClick}></div>
                            <div class="sort-dropdown">
                                <template for:each={sortOptions} for:item="option">
                                    <button
                                        key={option.value}
                                        class="sort-option"
                                        data-value={option.value}
                                        onclick={handleSortSelect}>
                                        {option.label}
                                    </button>
                            </template>
                        </div>
                    </template>
                </div>
            </div>

                <!-- Results List (library list-view pattern) -->
                <div class="search-results-list">
                    <template for:each={searchResults} for:item="result">
                        <!-- People -->
                        <template lwc:if={result.isPeople}>
                            <div
                                key={result.recordId}
                                class="feed-card-wrapper"
                                role="button"
                                tabindex="0"
                                data-record-id={result.recordId}
                                data-result-type={result.resultType}
                                aria-label={result.peopleAriaLabel}
                                onclick={handleResultClick}
                                onkeydown={handleResultKeydown}>
                                <div class="search-people-card">
                                    <template lwc:if={result.processedImageUrl}>
                                        <img src={result.processedImageUrl} alt={result.name} class="person-avatar" />
                                    </template>
                                    <template lwc:else>
                                        <img src={noProfilePhotoUrl} alt="" class="person-avatar" />
                                    </template>
                                    <div class="person-info">
                                        <div class="person-name">{result.name}</div>
                                        <template lwc:if={result.subType}>
                                            <div class="person-neighbourhood">{result.subType}</div>
                                        </template>
                                        <template lwc:if={result.shortDescription}>
                                            <div class="person-bio">{result.shortDescription}</div>
                                        </template>
                                    </div>
                                    <template lwc:if={result.showContactBadge}>
                                        <template lwc:if={result.hasSharedContact}>
                                            <span class="shared-badge">
                                                <img src={greenCircleUrl} alt="" class="badge-status-icon" />
                                                <span>Contact Info Shared</span>
                                            </span>
                                        </template>
                                        <template lwc:else>
                                            <span class="contact-not-shared-badge">
                                                <span>No Contact Info Shared</span>
                                            </span>
                                        </template>
                                    </template>
                                </div>
                            </div>
                        </template>

                        <!-- Story / Ask & Offer / Library / Skill -->
                        <template lwc:else>
                            <div
                                key={result.recordId}
                                class="feed-card-wrapper"
                                role="button"
                                tabindex="0"
                                data-record-id={result.recordId}
                                data-result-type={result.resultType}
                                aria-label="View result"
                                onclick={handleResultClick}
                                onkeydown={handleResultKeydown}>
                                <c-fimby-card
                                    layout="list"
                                    card-type={result.cardType}
                                    card-accent-color={result.accentColor}
                                    suppress-media-placeholder="true"
                                    title={result.name}
                                    description={result.shortDescription}
                                    show-header="false"
                                    show-avatar="true"
                                    show-menu="false"
                                    user-name={result.postedByName}
                                    avatar-url={result.processedAvatarUrl}
                                    timestamp={result.createdDate}
                                    images={result.images}
                                    badge-label={result.badgeLabel}
                                    badge-icon-url={result.badgeIconUrl}
                                    badge-style={result.badgeStyle}
                                    elevation="low"
                                    is-clickable="true"
                                    oncardclick={handleResultClick}
                                    onimageclick={handleResultClick}>
                                </c-fimby-card>
                            </div>
                        </template>
                    </template>
                </div>

                <!-- Load More -->
                <template lwc:if={hasMore}>
                    <div class="load-more-container">
                        <button class="load-more-btn" onclick={handleLoadMoreResults}>
                            Load More Results
                        </button>
                    </div>
                </template>
            </div>
        </template>
    </div>
</template>
