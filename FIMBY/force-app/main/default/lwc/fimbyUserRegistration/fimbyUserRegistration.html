<template>
    <div class="fimby-user-registration">
        <!-- Page Header -->
        <c-fimby-page-header
            page-title="Join FIMBY"
            show-progress="true"
            progress-value={progressValue}
            onback={handleBack}>
        </c-fimby-page-header>

        <!-- Progress Indicator -->
        <div class="progress-steps">
            <div class="steps-container">
                <template for:each={registrationSteps} for:item="step" for:index="index">
                    <div key={step.key} class={step.cssClass}>
                        <div class="step-number">{step.number}</div>
                        <div class="step-title">{step.title}</div>
                        <div lwc:if={step.showConnector} class="step-connector"></div>
                    </div>
                </template>
            </div>
        </div>

        <!-- Registration Form -->
        <div class="registration-container">
            <!-- Step 1: Basic Info -->
            <div lwc:if={isStep1} class="registration-step">
                <div class="step-header">
                    <h2 class="section-title">Tell us about yourself</h2>
                    <p class="step-subtitle">Basic information to get you started</p>
                </div>

                <div class="form-section">
                    <div class="form-field">
                        <label class="field-label" for="first-name">First Name <abbr class="slds-required" title="required">*</abbr></label>
                        <lightning-input
                            id="first-name"
                            type="text"
                            variant="label-hidden"
                            placeholder="Your first name"
                            value={firstName}
                            onchange={handleFirstNameChange}
                            required
                            class="form-input">
                        </lightning-input>
                    </div>

                    <div class="form-field">
                        <label class="field-label" for="last-name">Last Name <abbr class="slds-required" title="required">*</abbr></label>
                        <lightning-input
                            id="last-name"
                            type="text"
                            variant="label-hidden"
                            placeholder="Your last name"
                            value={lastName}
                            onchange={handleLastNameChange}
                            required
                            class="form-input">
                        </lightning-input>
                    </div>

                    <div class="form-field">
                        <label class="field-label" for="email">Email Address <abbr class="slds-required" title="required">*</abbr></label>
                        <lightning-input
                            id="email"
                            type="email"
                            variant="label-hidden"
                            placeholder="your@email.com"
                            value={email}
                            onchange={handleEmailChange}
                            required
                            class="form-input">
                        </lightning-input>
                    </div>

                    <div class="form-field">
                        <label class="field-label" for="phone">Phone Number</label>
                        <lightning-input
                            id="phone"
                            type="tel"
                            variant="label-hidden"
                            placeholder="(604) 555-0123"
                            value={phone}
                            onchange={handlePhoneChange}
                            class="form-input">
                        </lightning-input>
                    </div>

                    <div class="form-field-with-count">
                        <div class="field-label-row">
                            <label for="why-join" class="field-label">Why do you want to join FIMBY?</label>
                            <span class={whyJoinCountClass}>{whyJoinCharacterCount}/500</span>
                        </div>
                        <lightning-textarea
                            id="why-join"
                            variant="label-hidden"
                            placeholder="Tell your neighbors what drew you to our community..."
                            value={whyJoin}
                            onchange={handleWhyJoinChange}
                            max-length="500"
                            class="form-input">
                        </lightning-textarea>
                    </div>
                </div>

                <div class="step-actions">
                    <lightning-button
                        label="Continue"
                        variant="brand"
                        onclick={handleStep1Continue}
                        disabled={isStep1Invalid}
                        class="continue-btn">
                    </lightning-button>
                </div>
            </div>

            <!-- Step 2: Location -->
            <div lwc:if={isStep2} class="registration-step">
                <div class="step-header">
                    <h2 class="section-title">Where are you located?</h2>
                    <p class="step-subtitle">Help us connect you with nearby neighbors</p>
                </div>

                <div class="form-section">
                    <c-fimby-location-picker
                        label="Your Neighborhood"
                        selected-location={selectedLocation}
                        show-popular="true"
                        required="true"
                        onlocationselected={handleLocationSelected}>
                    </c-fimby-location-picker>
                </div>

                <div class="step-actions">
                    <lightning-button
                        label="Back"
                        variant="neutral"
                        onclick={handleBack}
                        class="back-btn">
                    </lightning-button>
                    <lightning-button
                        label="Continue"
                        variant="brand"
                        onclick={handleStep2Continue}
                        disabled={isStep2Invalid}
                        class="continue-btn">
                    </lightning-button>
                </div>
            </div>

            <!-- Step 3: Profile Photo -->
            <div lwc:if={isStep3} class="registration-step">
                <div class="step-header">
                    <h2 class="section-title">Add your photo</h2>
                    <p class="step-subtitle">Help neighbors recognize you (optional)</p>
                </div>

                <div class="form-section">
                    <c-fimby-image-uploader
                        label="Profile Photo"
                        accept="image/*"
                        max-file-size="2097152"
                        compression-quality="0.8"
                        onimageselected={handlePhotoSelected}
                        onimageremoved={handlePhotoRemoved}
                        class="profile-photo-uploader">
                    </c-fimby-image-uploader>

                    <div class="photo-tips">
                        <div class="tips-title">Photo Tips:</div>
                        <ul class="tips-list">
                            <li>Use a clear, recent photo of yourself</li>
                            <li>Face should be clearly visible</li>
                            <li>Keep it friendly and approachable</li>
                        </ul>
                    </div>
                </div>

                <div class="step-actions">
                    <lightning-button
                        label="Back"
                        variant="neutral"
                        onclick={handleBack}
                        class="back-btn">
                    </lightning-button>
                    <lightning-button
                        label="Continue"
                        variant="brand"
                        onclick={handleStep3Continue}
                        class="continue-btn">
                    </lightning-button>
                </div>
            </div>

            <!-- Step 4: Interests -->
            <div lwc:if={isStep4} class="registration-step">
                <div class="step-header">
                    <h2 class="section-title">What interests you?</h2>
                    <p class="step-subtitle">Select topics to personalize your experience</p>
                </div>

                <div class="form-section">
                    <div class="interests-grid">
                        <template for:each={interests} for:item="interest">
                            <button
                                key={interest.value}
                                class={interest.cssClass}
                                onclick={handleInterestToggle}
                                data-interest={interest.value}>
                                <lightning-icon
                                    icon-name={interest.icon}
                                    size="small"
                                    variant={interest.iconVariant}>
                                </lightning-icon>
                                <span class="interest-label">{interest.label}</span>
                            </button>
                        </template>
                    </div>
                </div>

                <div class="step-actions">
                    <lightning-button
                        label="Back"
                        variant="neutral"
                        onclick={handleBack}
                        class="back-btn">
                    </lightning-button>
                    <lightning-button
                        label="Continue"
                        variant="brand"
                        onclick={handleStep4Continue}
                        class="continue-btn">
                    </lightning-button>
                </div>
            </div>

            <!-- Step 5: Review -->
            <div lwc:if={isStep5} class="registration-step">
                <div class="step-header">
                    <h2 class="section-title">Review & Create Account</h2>
                    <p class="step-subtitle">Confirm your information and join FIMBY</p>
                </div>

                <div class="form-section">
                    <div class="review-card">
                        <div class="review-section">
                            <div class="review-title">Personal Information</div>
                            <div class="review-item">
                                <span class="review-label">Name:</span>
                                <span class="review-value">{fullName}</span>
                            </div>
                            <div class="review-item">
                                <span class="review-label">Email:</span>
                                <span class="review-value">{email}</span>
                            </div>
                            <div class="review-item">
                                <span class="review-label">Phone:</span>
                                <span class="review-value">{phone}</span>
                            </div>
                        </div>

                        <div class="review-section">
                            <div class="review-title">Location</div>
                            <div class="review-item">
                                <span class="review-label">Neighborhood:</span>
                                <span class="review-value">{selectedLocationLabel}</span>
                            </div>
                        </div>

                        <div class="review-section">
                            <div class="review-title">Interests</div>
                            <div class="selected-interests">
                                <template for:each={selectedInterests} for:item="interest">
                                    <span key={interest} class="interest-tag">{interest}</span>
                                </template>
                            </div>
                        </div>
                    </div>

                    <!-- Terms & Privacy -->
                    <div class="terms-section">
                        <lightning-input
                            type="checkbox"
                            label=""
                            checked={agreeToTerms}
                            onchange={handleTermsChange}
                            class="terms-checkbox">
                        </lightning-input>
                        <div class="terms-text">
                            I agree to the <a href="/terms" target="_blank">Terms of Service</a>
                            and <a href="/privacy" target="_blank">Privacy Policy</a>
                        </div>
                    </div>
                </div>

                <div class="step-actions">
                    <lightning-button
                        label="Back"
                        variant="neutral"
                        onclick={handleBack}
                        class="back-btn">
                    </lightning-button>
                    <lightning-button
                        label="Create Account"
                        variant="brand"
                        onclick={handleCreateAccount}
                        disabled={isCreateDisabled}
                        class="create-btn">
                    </lightning-button>
                </div>
            </div>
        </div>

        <!-- Loading Overlay -->
        <div lwc:if={isCreatingAccount} class="loading-overlay">
            <div class="loading-content">
                <lightning-spinner alternative-text="Creating your account..." size="large"></lightning-spinner>
                <div class="loading-text">Creating your FIMBY account...</div>
                <div class="loading-subtext">This may take a few moments</div>
            </div>
        </div>
    </div>
</template>
