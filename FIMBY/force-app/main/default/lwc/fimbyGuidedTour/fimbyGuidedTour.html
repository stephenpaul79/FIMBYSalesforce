<template>
    <template lwc:if={isActive}>
        <div class="tour-root" aria-hidden="false">
            <template lwc:if={showScrim}>
                <template lwc:if={hasSpotlight}>
                    <div class="scrim scrim-top" style={scrimTopStyle} onclick={handleScrimClick}></div>
                    <div class="scrim scrim-left" style={scrimLeftStyle} onclick={handleScrimClick}></div>
                    <div class="scrim scrim-right" style={scrimRightStyle} onclick={handleScrimClick}></div>
                    <div class="scrim scrim-bottom" style={scrimBottomStyle} onclick={handleScrimClick}></div>
                </template>
                <template lwc:else>
                    <div class="scrim scrim-full" onclick={handleScrimClick}></div>
                </template>
            </template>

            <template lwc:if={hasSpotlight}>
                <div class="spotlight-ring" style={spotlightRingStyle} aria-hidden="true"></div>
            </template>

            <template lwc:if={showCallout}>
                <div class="callout" style={calloutStyle} role="note" aria-live="polite">
                    <div class={calloutPointerClass} style={calloutPointerStyle}>
                        <template lwc:if={calloutArrowPointsUp}>
                            <div class="callout-arrow callout-arrow-up" aria-hidden="true"></div>
                        </template>
                        <div class="callout-label-block">
                            <p class="callout-label">{calloutLabel}</p>
                            <template lwc:if={calloutSublabel}>
                                <p class="callout-sublabel">{calloutSublabel}</p>
                            </template>
                        </div>
                        <template lwc:if={calloutArrowPointsDown}>
                            <div class="callout-arrow callout-arrow-down" aria-hidden="true"></div>
                        </template>
                    </div>
                    <button type="button" class="callout-sr-action" onclick={handleCalloutAction}>{calloutSrLabel}</button>
                </div>
            </template>

            <template lwc:if={showModalCoach}>
                <div
                    class="modal-coach"
                    role="dialog"
                    aria-modal="true"
                    aria-labelledby="modal-coach-title"
                    tabindex="-1"
                    data-id="modal-coach"
                    onkeydown={handleBubbleKeydown}
                >
                    <p id="modal-coach-title" class="modal-coach-hint">{modalCoachHint}</p>
                    <template lwc:if={showProgressSection}>
                        <div class="progress-section progress-section-coach" aria-hidden="true">
                            <template lwc:if={vineUrl}>
                                <div class="vine-chip">
                                    <img src={vineUrl} alt="" class="vine-img" />
                                </div>
                            </template>
                            <p class="progress-label">{progressLabel}</p>
                        </div>
                    </template>
                    <div class="footer-actions-row">
                        <button type="button" class="btn btn-outline" onclick={handleSkip}>Skip Walkthrough</button>
                    </div>
                </div>
            </template>

            <template lwc:if={showMainDialog}>
                <div
                    class={mainDialogClass}
                    style={bubbleStyle}
                    role="dialog"
                    aria-modal="true"
                    aria-labelledby="tour-title"
                    aria-describedby="tour-body"
                    tabindex="-1"
                    data-id="tour-bubble"
                    onkeydown={handleBubbleKeydown}
                >
                    <div class="bubble-body">
                        <template lwc:if={showBubbleHeaderRow}>
                            <div class="bubble-header-row">
                                <div class="bubble-header-start">
                                    <template lwc:if={stepIconUrl}>
                                        <img src={stepIconUrl} alt="" class="step-icon" />
                                    </template>
                                </div>
                                <div class="bubble-header-center">
                                    <template lwc:if={vineUrl}>
                                        <img src={vineUrl} alt="" class="vine-img-header" />
                                    </template>
                                </div>
                                <div class="bubble-header-end">
                                    <template lwc:if={progressLabel}>
                                        <span class="progress-badge">{progressLabel}</span>
                                    </template>
                                </div>
                            </div>
                        </template>
                        <template lwc:if={heroImageUrl}>
                            <img src={heroImageUrl} alt={heroAlt} class="hero-image" />
                        </template>
                        <h2 id="tour-title" class="bubble-title">{displayTitle}</h2>
                        <p id="tour-body" class="bubble-text">{displayBody}</p>
                    </div>

                    <div class="bubble-footer">
                        <template lwc:if={isOffRamp}>
                            <div class="footer-actions-row">
                                <button type="button" class="btn btn-outline" onclick={handleOffRampDone}>Skip for now</button>
                                <button type="button" class="btn btn-primary" onclick={handleOffRampKeep}>Keep exploring</button>
                            </div>
                        </template>
                        <template lwc:elseif={isIntroPost}>
                            <div class="footer-actions-row">
                                <button type="button" class="btn btn-outline" onclick={handleIntroPostSkip}>Skip for now</button>
                                <button type="button" class="btn btn-primary" onclick={handleIntroPostOpen}>Say hi</button>
                            </div>
                        </template>
                        <template lwc:elseif={isExtendedFinish}>
                            <div class="footer-actions-row footer-actions-row-center">
                                <button type="button" class="btn btn-primary" onclick={handleNext}>Finish</button>
                            </div>
                        </template>
                        <template lwc:else>
                            <div class="footer-actions-row">
                                <button type="button" class="btn btn-outline" onclick={handleSkip}>Skip Walkthrough</button>
                                <button type="button" class="btn btn-primary" onclick={handleNext} disabled={isNextDisabled}>Next</button>
                            </div>
                        </template>
                    </div>
                </div>
            </template>
        </div>

        <c-fimby-intro-post-modal
            onbioposted={handleBioPosted}
            onbioskipped={handleBioSkipped}
        ></c-fimby-intro-post-modal>
    </template>
</template>
